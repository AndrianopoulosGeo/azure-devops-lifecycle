# Azure Pipelines — Next.js + Vercel
# Auto-generated by /init-project. Customize as needed.

trigger:
  branches:
    include:
      - staging
      - master

variables:
  - group: project-secrets  # Contains VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID

stages:
  - stage: Test
    displayName: 'Test'
    jobs:
      - job: Test
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '22.x'
          - script: npm ci
            displayName: 'Install dependencies'
          - script: npm test
            displayName: 'Run unit tests'

  - stage: DeployStaging
    displayName: 'Deploy to Staging (Preview)'
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/staging'))
    jobs:
      - deployment: DeployStaging
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    npm i -g vercel
                    vercel pull --yes --environment=preview --token=$(VERCEL_TOKEN)
                    vercel build --token=$(VERCEL_TOKEN)
                    vercel deploy --prebuilt --token=$(VERCEL_TOKEN)
                  displayName: 'Deploy to Vercel Preview'

  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - deployment: DeployProduction
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    npm i -g vercel
                    vercel pull --yes --environment=production --token=$(VERCEL_TOKEN)
                    vercel build --prod --token=$(VERCEL_TOKEN)
                    vercel deploy --prebuilt --prod --token=$(VERCEL_TOKEN)
                  displayName: 'Deploy to Vercel Production'
