# Azure Pipelines — .NET + Azure App Service (Container)
# Auto-generated by /init-project. Customize as needed.

trigger:
  branches:
    include:
      - staging
      - master

variables:
  - group: project-secrets  # Contains AZURE_SUBSCRIPTION_ID, AZURE_RESOURCE_GROUP, etc.

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UseDotNet@2
            inputs:
              version: '9.x'
          - script: dotnet restore
            displayName: 'Restore packages'
          - script: dotnet build --configuration Release --no-restore
            displayName: 'Build'
          - script: dotnet test --configuration Release --no-build
            displayName: 'Run tests'
          - task: Docker@2
            displayName: 'Build container image'
            inputs:
              command: 'build'
              Dockerfile: '**/Dockerfile'
              tags: '$(Build.BuildId)'

  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/staging'))
    jobs:
      - deployment: DeployStaging
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION_ID)'
                    appName: '$(AZURE_APP_SERVICE_NAME)-staging'
                    containers: '$(AZURE_CONTAINER_REGISTRY).azurecr.io/app:$(Build.BuildId)'

  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - deployment: DeployProduction
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  inputs:
                    azureSubscription: '$(AZURE_SUBSCRIPTION_ID)'
                    appName: '$(AZURE_APP_SERVICE_NAME)'
                    containers: '$(AZURE_CONTAINER_REGISTRY).azurecr.io/app:$(Build.BuildId)'
