# Azure Pipelines — Next.js + Hetzner (tar+ssh)
# Auto-generated by /init-project. Customize as needed.

trigger:
  branches:
    include:
      - staging
      - master

variables:
  - group: project-secrets  # Contains SSH_HOST, SSH_USER, SSH_KEY, REMOTE_APP_PATH

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '22.x'
          - script: npm ci
            displayName: 'Install dependencies'
          - script: npm run build
            displayName: 'Build application'
          - script: npm test
            displayName: 'Run unit tests'
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '.next'
              ArtifactName: 'build'

  - stage: DeployStaging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/staging'))
    jobs:
      - deployment: DeployStaging
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    tar -czf deploy.tar.gz .next package.json package-lock.json public
                    scp -o StrictHostKeyChecking=no deploy.tar.gz $(SSH_USER)@$(SSH_HOST):$(REMOTE_APP_PATH)/
                    ssh -o StrictHostKeyChecking=no $(SSH_USER)@$(SSH_HOST) "cd $(REMOTE_APP_PATH) && tar -xzf deploy.tar.gz && npm ci --production && pm2 restart app"
                  displayName: 'Deploy via tar+ssh'

  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - deployment: DeployProduction
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    tar -czf deploy.tar.gz .next package.json package-lock.json public
                    scp -o StrictHostKeyChecking=no deploy.tar.gz $(SSH_USER)@$(SSH_HOST):$(REMOTE_APP_PATH)/
                    ssh -o StrictHostKeyChecking=no $(SSH_USER)@$(SSH_HOST) "cd $(REMOTE_APP_PATH) && tar -xzf deploy.tar.gz && npm ci --production && pm2 restart app"
                  displayName: 'Deploy via tar+ssh'
